<!DOCTYPE html>
<!--
  data-orientation is stamped into this file by the build (Arsmi Games -> Build WebGL, which
  asks portrait or landscape). The value below is only the default, for a build made some
  other way.

  It is written afterwards, by the post-processor, rather than by one of Unity's own template
  macros: Unity evaluates those against a fixed set of names it knows, and a name it does not
  know fails the build instead of producing an empty string.

  Nothing in this file may contain a Unity macro delimiter - three braces - not even inside a
  comment like this one. The preprocessor scans the raw text, so it finds them in comments
  too, and evaluates whatever sits between them. This very comment used to name the delimiter
  literally, which made Unity try to evaluate the expression " " and fail the build with
  "Cannot read property 'toString' of undefined" - an error that points at the file but not
  at the sentence.
-->
<html lang="en-us" data-orientation="landscape">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">

    <!--
      Static, not injected from JS.

      This used to be appended to <head> from script, which is after the browser has already
      laid the page out once — so on a notched phone the first frame is laid out against the
      wrong viewport and the canvas is the wrong size until something forces a reflow.
      viewport-fit=cover is what lets the canvas reach under the notch instead of being
      letterboxed by the safe area.
    -->
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, viewport-fit=cover">

    <title>{{{ PRODUCT_NAME }}}</title>

    <!--
      The platform SDK. Without it the game cannot talk to Arsmi Games at all:
      GameHubBridge.jslib only wires itself up if window.GameHubSDK already exists,

          if (!window.GameHubBridge && window.GameHubSDK) { ...create... }

      so with no SDK on the page, window.GameHubBridge is never created, every Emit
      from C# is a silent no-op, and no listeners are installed. The game neither
      sends nor receives anything — and nothing errors to tell you why.

      Two sources, in order:

      1. /sdk/gamehub-sdk.js — the platform's own copy, always current. This only
         resolves when the platform is serving the build (/unity/<slug>/...), because
         the path is absolute.

      2. gamehub-sdk.js — the copy that ships inside this build. Needed because a
         build hosted ANYWHERE else (a static host, Cloudflare Pages, file://) would
         resolve the absolute path against that host and get a 404.

      document.write is deliberate: it is synchronous, so the SDK is guaranteed to be
      defined before the Unity loader runs. C# Awake() calls straight into the bridge,
      so "eventually loaded" is not good enough.
    -->
    <script src="/sdk/gamehub-sdk.js"></script>
    <script>
      if (!window.GameHubSDK) {
        document.write('<script src="gamehub-sdk.js"><\/script>');
      }
    </script>

    <style>
      html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden;background:#000}

      /*
        Orientation lock.

        The post-processor stamps data-orientation on <html> (landscape or portrait). Those
        two numbers turn it into an aspect ratio; the canvas is then locked to that shape and
        centred, and a window of a different shape shows black bars rather than stretching the
        game. This is what makes a portrait build stay portrait on a landscape screen.

        Without this the canvas filled 100% x 100% of the window, so the game took whatever
        shape the window was — a portrait game ran landscape on a desktop.

        If your game is not 16:9 / 9:16 (say it is 3:4), change the matching pair below.
      */
      html               { --ar-w:16; --ar-h:9;  }   /* default / landscape */
      html[data-orientation="portrait"] { --ar-w:9; --ar-h:16; }

      #unity-container{
        position:fixed;inset:0;
        display:flex;align-items:center;justify-content:center;
        overflow:hidden;background:#000;
      }

      /*
        The largest box of the chosen ratio that fits the window. min() picks whichever
        dimension is the limit; the other follows from the ratio. No !important and no inline
        style may override this, or the lock is lost — see the JS below, which used to.
      */
      #unity-canvas{
        display:block;background:#000;
        width:  min(100vw, calc(100vh * var(--ar-w) / var(--ar-h)));
        height: min(100vh, calc(100vw * var(--ar-h) / var(--ar-w)));
      }

      #unity-loading-bar{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);display:none}
      #unity-progress-bar-empty{width:200px;height:6px;background:#1c1b20;border-radius:3px;overflow:hidden}
      #unity-progress-bar-full{width:0;height:100%;background:#cc785c}
      #unity-footer{display:none!important}
      #unity-warning{position:absolute;left:50%;top:5%;transform:translate(-50%);background:#000;color:#fff}
    </style>
  </head>
  <body>
    <div id="unity-container">
      <canvas id="unity-canvas" width={{{ WIDTH }}} height={{{ HEIGHT }}} tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"></div>
      <div id="unity-footer"></div>
    </div>

    <script>
      var canvas = document.querySelector("#unity-canvas");

      // Report engine progress to the platform. Without this it can only see the
      // iframe's load event, which fires long before the wasm has downloaded and
      // compiled — so it would hide its loading screen and leave the player
      // staring at a black frame until Unity finally paints.
      function postToPlatform(type, payload) {
        try {
          if (window.parent && window.parent !== window) {
            var msg = { type: type, ts: Date.now(), version: 1 };
            for (var k in (payload || {})) msg[k] = payload[k];
            window.parent.postMessage(msg, "*");
          }
        } catch (e) { /* not embedded, or blocked */ }
      }
      postToPlatform("gamehub:unity:progress", { progress: 0 });

      function unityShowBanner(msg, type) {
        var warningBanner = document.querySelector("#unity-warning");
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: red; padding: 10px;';
        else {
          if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
          setTimeout(function () {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/{{{ LOADER_FILENAME }}}";
      var config = {
        arguments: [],
        dataUrl: buildUrl + "/{{{ DATA_FILENAME }}}",
        frameworkUrl: buildUrl + "/{{{ FRAMEWORK_FILENAME }}}",
#if USE_THREADS
        workerUrl: buildUrl + "/{{{ WORKER_FILENAME }}}",
#endif
#if USE_WASM
        codeUrl: buildUrl + "/{{{ CODE_FILENAME }}}",
#endif
#if MEMORY_FILENAME
        memoryUrl: buildUrl + "/{{{ MEMORY_FILENAME }}}",
#endif
#if SYMBOLS_FILENAME
        symbolsUrl: buildUrl + "/{{{ SYMBOLS_FILENAME }}}",
#endif
        streamingAssetsUrl: "StreamingAssets",
        companyName: {{{ JSON.stringify(COMPANY_NAME) }}},
        productName: {{{ JSON.stringify(PRODUCT_NAME) }}},
        productVersion: {{{ JSON.stringify(PRODUCT_VERSION) }}},
        showBanner: unityShowBanner,
        devicePixelRatio: Math.min(
          (/Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent) ||
            (window.matchMedia && window.matchMedia('(pointer: coarse)').matches)) ? 1 : 2,
          Math.max(1, window.devicePixelRatio || 1)
        ),
      };

      // The canvas size is owned entirely by the orientation-lock CSS above. Setting it here
      // (as this template used to, with canvas.style.width/height = "100%") would inline-style
      // over that lock and stretch the game back to the window's shape — the exact bug the lock
      // exists to prevent. Unity reads the canvas's rendered size and matches its framebuffer
      // to it, so CSS alone is enough; it needs no help from here.

      document.querySelector("#unity-loading-bar").style.display = "block";
      canvas.addEventListener('webglcontextlost', function (e) {
        e.preventDefault();
        unityShowBanner('WebGL context lost.', 'error');
      });

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = function () {
        createUnityInstance(canvas, config, function (progress) {
          document.querySelector("#unity-progress-bar-full").style.width = 100 * progress + "%";
          postToPlatform("gamehub:unity:progress", { progress: progress });
        }).then(function (unityInstance) {
          document.querySelector("#unity-loading-bar").style.display = "none";
          window.unityInstance = unityInstance;
          // Tell the platform what this build was actually made for. It already has an
          // orientation on the game record, typed in by whoever uploaded it; this is the
          // build answering for itself, so the two can be compared instead of trusted.
          postToPlatform("gamehub:unity:ready", {
            orientation: document.documentElement.getAttribute("data-orientation") || "landscape",
          });
        }).catch(function (message) {
          postToPlatform("gamehub:unity:error", { error: String(message) });
          unityShowBanner(message, 'error');
        });
      };
      document.body.appendChild(script);
    </script>
  </body>
</html>
